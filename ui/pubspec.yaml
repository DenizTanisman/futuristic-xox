name: futuristic_xox
description: "Futuristic XOX — enhanced tic-tac-toe with valued, capturing pawns (mobile-first)."
publish_to: "none"
version: 0.1.0+1

environment:
  # Color.withValues() (used in the theme/widgets) requires Flutter 3.27 / Dart 3.6+.
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  # Cinzel (display/headings) + Rajdhani (UI/numbers) for the themed look.
  google_fonts: ^6.2.1
  # The game backend runs on the pure-Dart mock out of the box. The native Rust backend
  # (flutter_rust_bridge + ffi) is added during the integration step — see ui/README.md.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
