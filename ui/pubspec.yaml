name: futuristic_xox
description: "Futuristic XOX — enhanced tic-tac-toe with valued, capturing pawns (mobile-first)."
publish_to: "none"
version: 1.1.0+3

environment:
  # Color.withValues() (used in the theme/widgets) requires Flutter 3.27 / Dart 3.6+.
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Cinzel (display/headings) + Rajdhani (UI/numbers) for the themed look.
  google_fonts: ^6.2.1
  intl: any # version pinned by flutter_localizations
  shared_preferences: ^2.3.2 # persist locale + theme + SFX choices
  url_launcher: ^6.3.1 # mailto: contact link
  audioplayers: ^6.1.0 # low-latency preloaded SFX (menu/place/select/win/lose/draw)
  # The game backend runs on the pure-Dart mock out of the box. The native Rust backend
  # (flutter_rust_bridge + ffi) is added during the integration step — see ui/README.md.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true # build AppLocalizations from lib/l10n/*.arb
  assets:
    - assets/audio/ # preloaded SFX clips (menu/place/select/win/lose/draw)

# App launcher + adaptive icons. Masters are generated by test/icon_gen_test.dart.
# iOS master is opaque (filled to the corners); Android uses an adaptive fg + solid bg colour.
flutter_launcher_icons:
  image_path: "assets/icon/icon_ios.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#1B1209"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21
